name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Đảm bảo nhánh của bạn trên GitHub tên là 'main'

# Thiết lập quyền hạn để GitHub Actions có thể ghi dữ liệu vào Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo chỉ có một tiến trình deploy chạy tại một thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Đường dẫn cực kỳ quan trọng: Phải khớp chính xác với thư mục trong repo của bạn
          path: './BAITAP7/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4